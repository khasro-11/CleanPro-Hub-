services:
  postgres:
    image: postgres:16-alpine
    container_name: cleanpro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cleanpro
      POSTGRES_PASSWORD: cleanpro_dev_password
      POSTGRES_DB: cleanpro_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleanpro -d cleanpro_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
